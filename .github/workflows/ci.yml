name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Check formatting with ruff
        # BLOCKING: All Python code must be formatted with ruff.
        run: uv run ruff format --check .

      - name: Check lint with ruff (formatting + import order)
        # BLOCKING: E501, I001, W291, W293, E701 must pass.
        # COM812 handled by ruff format, not needed here.
        run: uv run ruff check . --select E501,I001,W291,W293,E701

      - name: Check lint with ruff (full)
        # Soft check: reports remaining historic findings but does not block.
        continue-on-error: true
        run: uv run ruff check .

      - name: Run test suite
        env:
          CI: "true"
        run: uv run pytest -q --tb=short
