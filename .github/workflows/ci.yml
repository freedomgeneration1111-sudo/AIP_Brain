  sprint-530:
    name: Tests — sprint 530
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run sprint 530 tests
        env:
          CI: "true"
        # Process-hang detection: tests pass but uv/pytest process may not exit
        # due to lingering background threads from AlertManager/FastAPI lifespan.
        # If timeout fires (RC=124) but tests reported success, exit 0.
        run: |
          set +e
          CI=true timeout 300 uv run pytest tests/test_sprint530*.py -vv --tb=short --durations=20 > /tmp/test_output.txt 2>&1
          RC=$?
          set -e
          cat /tmp/test_output.txt
          if [ $RC -eq 124 ]; then
            if grep -qE '[0-9]+ passed' /tmp/test_output.txt; then
              echo "::warning::Tests passed but process cleanup hung after completion"
              exit 0
            else
              echo "::error::Process timed out and tests did NOT pass"
              exit 1
            fi
          else
            exit $RC
          fi

