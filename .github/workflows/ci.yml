name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        # Soft check: reports issues but does not block CI.
        # Existing codebase has ~500 historic lint findings (F401/I001).
        # Make this blocking once those are resolved.
        continue-on-error: true
        run: uv run ruff check .

      - name: Run test suite
        env:
          CI: "true"
        run: uv run pytest -q --tb=short
