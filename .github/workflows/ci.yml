name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Check formatting with ruff
        # BLOCKING: All Python code must be formatted with ruff.
        run: uv run ruff format --check .

      - name: Check lint with ruff
        # BLOCKING: Baseline lint rules (E, F, W, I) must pass.
        # These cover: syntax errors, unused imports, unused variables,
        # import sorting, line length, and whitespace issues.
        run: uv run ruff check .

  core-tests:
    name: Tests — core (a–r)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run core tests
        env:
          CI: "true"
        run: >
          uv run pytest
          tests/test_a*.py tests/test_b*.py tests/test_c*.py tests/test_d*.py
          tests/test_e*.py tests/test_f*.py tests/test_g*.py tests/test_i*.py
          tests/test_k*.py tests/test_l*.py tests/test_m*.py tests/test_n*.py
          tests/test_o*.py tests/test_p*.py tests/test_r*.py
          -q --tb=short

