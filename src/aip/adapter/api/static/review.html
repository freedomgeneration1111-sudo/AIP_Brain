<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Queue — AIP 0.1</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 p-8 max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-semibold">Review Queue</h1>
        <a href="/" class="text-sm text-zinc-400 hover:text-white">← Dashboard</a>
    </div>

    <div id="review-list" hx-get="/api/v1/reviews" hx-trigger="load" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
        <div class="text-sm text-zinc-400">Loading review queue...</div>
    </div>

    <div class="mt-8 text-xs text-zinc-500">
        Approvals use the 9.2 Canonical Promotion Pipeline (evaluations + AutonomyGate + Vigil health recording).
    </div>
</body>
</html>
