# Minimal retrieval configuration for Phase 1 bootstrap (per Rev 1.3 CHUNK-0.BOOTSTRAP delta)
# This is the authoritative place for toggleable harness parameters (§1.8).

[retrieval]
confidence_threshold = 0.30
weight_semantic      = 0.60
weight_recency       = 0.15
weight_authority     = 0.15
weight_frequency     = 0.10

# CHUNK-3.9 example for Phase 3 real embedding slot (Rev 1.3).
# In Phase 1/CI: provider = "fake" (default, uses deterministic fake_embed).
# In Phase 3+: set provider = "local" (or "api") and specify model to load a real embedder.
# NOTE: The [models.embedding] slot is now the primary config for the embedding
# provider. The [embedding] section is kept for backward compatibility but the
# models.embedding slot takes priority when both are configured.
[embedding]
provider = "openai_compatible"
model = "nvidia/llama-nemotron-embed-vl-1b-v2:free"
base_url = "https://openrouter.ai/api"
# api_key = ""   # Set your key here, or use AIP_EMBEDDING_API_KEY / AIP_OPENAI_API_KEY env var

# --- Phase 5 additions (append only) ---
# Per CHUNK-7.0a ANNEX + prose: all Sexton/ACE/router/budget/beast params
# toggleable per §1.8. Defaults match the spec.

[sexton]
classification_batch_size = 50
classification_interval_seconds = 300     # 5 minutes
audit_on_slot_change = true
max_unclassified_before_alert = 10

[ace_playbook]
db_path = "db/ace_playbook.db"
auto_derive = true                        # Sexton auto-derives entries from classifications
min_confidence = 0.70                     # minimum Sexton confidence to auto-promote entry

[router]
default_exploration_weight = 0.10
min_sample_count = 10                     # need at least 10 routing_outcomes before adjusting weights
weight_decay = 0.95                       # exponential decay for old routing outcomes
domain_overrides = {}                     # per-domain exploration_weight overrides

[budget]
session_token_limit = 500000
project_token_limit = 5000000
daily_token_limit = 10000000
budget_warning_threshold = 0.80
budget_hard_stop = true

# Beast handles context advisory only (ADR-011).
# Sexton handles background maintenance (tagging, embedding, wiki, graph, failure classification).
# Beast's run_cycle() is a lightweight heartbeat; heavy work was moved to Sexton.
[beast]
corpus_reindex_interval_seconds = 3600    # 1 hour
entity_maintenance_interval_seconds = 1800  # 30 minutes
health_check_interval_seconds = 60
max_reindex_batch_size = 1000

# --- Phase 6 additions (append only) ---
# Per CHUNK-8.0a ANNEX + prose: all surface (api/cli/mcp/chat/autonomy/lexical) params
# toggleable per §1.8. Defaults match the spec. Surfaces compose Phase 5 actor layer
# via Protocols + AutonomyGate (no bypass per §1.7 / Appendix D).

[api]
host = "127.0.0.1"
port = 8000
cors_origins = ["http://localhost:3000"]
workers = 1
chat_max_history_turns = 50
review_page_size = 20
artifact_page_size = 20

[cli]
color = true
pager = true
output_format = "table"              # table / json / yaml

[mcp]
enabled = true
transport = "stdio"                   # stdio / sse
max_concurrent_tools = 5

[chat]
system_prompt_path = "prompts/chat_system.md"
max_context_turns = 50
auto_summarize_at = 40               # trigger summarization at this turn count

[autonomy]
default_level = "read"               # default autonomy for new sessions
escalation_requires_definer = true    # admin actions require DEFINER approval
audit_retention_days = 90
model_gen_assumption = "Models should not autonomously escalate to admin actions"

[lexical]
db_path = "db/lexical.db"
fts5_tokenizer = "unicode61"

# --- Phase 8 additions (append only) ---
# Per CHUNK-10.0a ANNEX + prose: knowledge compilation, plugin system,
# collaborator access, performance tuning, release metadata.
# All toggleable per §1.8. Defaults per spec. KnowledgeStore distinct from Canonical.

[knowledge]
compilation_model_slot = "synthesis"
evaluation_model_slot = "evaluation"
max_source_canonicals = 10
compilation_confidence_threshold = 0.60
auto_index_on_approval = true
model_gen_assumption = "Synthesis model can reliably produce structured knowledge summaries from multiple canonical sources"

[plugins]
plugins_dir = "plugins"
enabled = true
auto_discover = true
sandbox_mode = true
model_gen_assumption = "Plugins provide extensibility for model providers beyond built-in slots"

[collaborators]
enabled = false
max_collaborators = 5
collaborator_can_create_drafts = true
collaborator_can_submit_review = true
collaborator_can_approve = false
readonly_can_search = true

[performance]
profiling_enabled = false
max_memory_mb = 4096
retrieval_timeout_seconds = 30.0
batch_embed_size = 32
sqlite_wal_mode = true
sqlite_busy_timeout_ms = 5000
vector_query_limit = 50
fts5_query_limit = 50

[release]
release_version = "0.1.0"
release_date = ""  # set by 10.7
release_status = "alpha"
architecture_revision = "5.2"

# --- Phase 7 additions (append only) ---
# Per CHUNK-9.0a ANNEX + prose: vigil, auth, rate limiting,
# canonical pipeline, deployment profiles.
# All toggleable per §1.8. Defaults per spec.

[review]
faithfulness_threshold = 0.85
domain_coherence_threshold = 0.80
require_definer_approval = true
auto_promote_on_approval = false

[workflow]
default_template = "workflow_01"
max_parallel_nodes = 3
context_reset_turn_threshold = 40

[ecs]
db_path = "db/ecs.db"
transition_audit_enabled = true

[trajectory]
loop_detection_window = 5
anxiety_threshold = 0.7
failure_streak_threshold = 3
context_reset_on_anxiety = true

[evaluation]
faithfulness_threshold = 0.85
domain_coherence_threshold = 0.80
adversarial_enabled = false

[vigil]
canonical_health_check_interval_seconds = 3600
stale_threshold_days = 30
re_evaluate_on_slot_change = true
max_re_evaluate_batch_size = 50
entity_consistency_check = true

[auth]
# IMPORTANT: auth_enabled=false means ALL requests are treated as DEFINER.
# This is acceptable for laptop/local development but MUST be true in production.
# The middleware logs a warning on every request when auth is disabled.
auth_enabled = false
session_timeout_seconds = 86400
api_key_enabled = true
bcrypt_rounds = 12
definer_identity = "definer"

[rate_limit]
enabled = true
requests_per_minute = 60
burst_size = 10
per_endpoint_overrides = {}
model_budget_protection = true

[canonical_pipeline]
faithfulness_threshold = 0.85
domain_coherence_threshold = 0.80
require_vigil_health_check = true
indexing_enabled = true
require_definer_approval = true

[deployment]
profile_name = "laptop"
vector_backend = "sqlite_vss"
model_provider = "openrouter"
# IMPORTANT: auth_enabled must be true in production deployments.
# The laptop profile defaults to false for local development convenience.
# Production deployments MUST set auth_enabled = true or provide the
# auth.auth_enabled = true override via environment or config.
auth_enabled = false
workers = 1
memory_limit_mb = 4096


[database]
db_path = "db/state.db"

# Read connection pool configuration for SQLite stores in WAL mode.
# Pool size determines how many concurrent read-only connections each store
# maintains.  Default is 3 (adequate for single-process with moderate concurrency).
# Increase to 5-7 when serving multiple concurrent ask requests.
# Per-store overrides take precedence over the global default.
# Sprint 5.25: pool_size and per-store overrides are hot-reloadable
# (changes take effect without process restart via ConfigWatcher).
[read_pool]
pool_size = 3                    # global default for all pool-enabled stores

[read_pool.stores]
# Per-store overrides (uncomment and adjust as needed):
# lexical_store = { pool_size = 5 }
# vector_store = { pool_size = 5 }
# graph_store = { pool_size = 3 }
# corpus_turn_store = { pool_size = 4 }

# Sprint 5.25: Operator alerting — lightweight webhook/email notifications.
# Alerting is opt-in and disabled by default. Enable and configure at least
# one transport (webhook_url or email_to) to receive notifications for:
# - Vigil quality degradation (faithfulness score dropping over cycles)
# - Read pool auto-sizing adjustments (increases and rollbacks)
# - Graph extraction batch size reductions due to high parse failure rate
[alerting]
enabled = false
# webhook_url = ""              # HTTP(S) URL for JSON POST alerts (Slack, etc.)
# email_to = ""                 # Comma-separated recipient addresses
# email_from = "aip-brain@localhost"
# smtp_host = ""                # SMTP server hostname
# smtp_port = 587               # SMTP server port
alert_on_quality_degradation = true
alert_on_pool_adjustment = true
alert_on_batch_reduction = true
min_alert_interval_seconds = 300  # Rate-limit: don't re-alert same subject for 5 min
# Sprint 5.30: Escalation configuration
# escalation_threshold = 3            # Alert N times before escalating
# escalation_window_seconds = 3600    # Count alerts within this window
# escalation_severity = "critical"    # Severity to escalate to
# escalation_additional_transports = []  # Extra transports on escalation

# Sprint 5.31: Alert digest/aggregation
# digest_enabled = false              # Enable digest for info-severity alerts
# digest_interval_minutes = 15        # Flush digest every N minutes
# digest_min_alerts = 3               # Flush digest when N alerts are buffered

# Sprint 5.25: Configuration hot-reload.
# When enabled, the ConfigWatcher polls aip.config.toml for changes and
# applies safe values (read_pool.pool_size, sexton.batch_size) without
# a full process restart. Only specific low-risk keys are hot-reloadable.
[config_hot_reload]
enabled = true                   # Enable config file change detection
poll_interval_seconds = 5        # How often to check for config file changes


[vector_backend]
provider = "pgvector"
host = "127.0.0.1"
port = 5432

# ============================================================
# Model Slots — OpenRouter Configuration
# ============================================================
# All slots use OpenRouter (openai_compatible provider).
# base_url may be "https://openrouter.ai/api" or "https://openrouter.ai/api/v1"
# (the clients normalize and append /v1/... only if needed).
#
# To run WITHOUT putting keys in this file (recommended for sharing):
#   - Comment out or remove the "api_key = ..." lines below.
#   - Set env vars before running, e.g.:
#       export AIP_OPENAI_API_KEY=sk-...
#     or per-slot (overrides the global one):
#       export AIP_SYNTHESIS_API_KEY=sk-...
#       export AIP_EVALUATION_API_KEY=sk-...
#       export AIP_SEXTON_API_KEY=sk-...
#       export AIP_EMBEDDING_API_KEY=sk-...
#       export AIP_BEAST_API_KEY=sk-...
#
# You can still hardcode keys here (per-slot) if you prefer.
# The [models.xxx] sections take priority over the legacy [embedding] section.
# ============================================================

[models]
ci_mode = false

[models.synthesis]
provider = "openai_compatible"
model = "meta-llama/llama-4-maverick"
base_url = "https://openrouter.ai/api"
# api_key = ""   # Set via AIP_SYNTHESIS_API_KEY env var

[models.evaluation]
provider = "openai_compatible"
model = "openai/gpt-oss-20b:free"
base_url = "https://openrouter.ai/api"
# api_key = ""   # Set your key here, or use AIP_EVALUATION_API_KEY / AIP_OPENAI_API_KEY env var

[models.sexton]
provider = "openai_compatible"
model = "google/gemma-4-31b-it:free"
base_url = "https://openrouter.ai/api"
# api_key = ""   # Set your key here, or use AIP_SEXTON_API_KEY / AIP_OPENAI_API_KEY env var

[models.embedding]
provider = "openai_compatible"
model = "nvidia/llama-nemotron-embed-vl-1b-v2:free"
base_url = "https://openrouter.ai/api"
# api_key = ""   # Set your key here, or use AIP_EMBEDDING_API_KEY / AIP_OPENAI_API_KEY env var

[models.beast]
provider = "openai_compatible"
model = "nvidia/nemotron-3-super-120b-a12b"
base_url = "https://openrouter.ai/api"
# api_key = ""   # Set your key here, or use AIP_BEAST_API_KEY / AIP_OPENAI_API_KEY env var
