# Minimal retrieval configuration for Phase 1 bootstrap (per Rev 1.3 CHUNK-0.BOOTSTRAP delta)
# This is the authoritative place for toggleable harness parameters (§1.8).

[retrieval]
confidence_threshold = 0.30
weight_semantic      = 0.60
weight_recency       = 0.15
weight_authority     = 0.15
weight_frequency     = 0.10

# CHUNK-3.9 example for Phase 3 real embedding slot (Rev 1.3).
# In Phase 1/CI: provider = "fake" (default, uses deterministic fake_embed).
# In Phase 3+: set provider = "local" (or "api") and specify model to load a real embedder.
[embedding]
provider = "fake"
# model = "sentence-transformers/all-MiniLM-L6-v2"  # example for real local provider

# --- Phase 5 additions (append only) ---
# Per CHUNK-7.0a ANNEX + prose: all Sexton/ACE/router/budget/beast params
# toggleable per §1.8. Defaults match the spec.

[sexton]
classification_batch_size = 50
classification_interval_seconds = 300     # 5 minutes
audit_on_slot_change = true
max_unclassified_before_alert = 10

[ace_playbook]
db_path = "db/ace_playbook.db"
auto_derive = true                        # Sexton auto-derives entries from classifications
min_confidence = 0.70                     # minimum Sexton confidence to auto-promote entry

[router]
default_exploration_weight = 0.10
min_sample_count = 10                     # need at least 10 routing_outcomes before adjusting weights
weight_decay = 0.95                       # exponential decay for old routing outcomes
domain_overrides = {}                     # per-domain exploration_weight overrides

[budget]
session_token_limit = 500000
project_token_limit = 5000000
daily_token_limit = 10000000
budget_warning_threshold = 0.80
budget_hard_stop = true

[beast]
corpus_reindex_interval_seconds = 3600    # 1 hour
entity_maintenance_interval_seconds = 1800  # 30 minutes
health_check_interval_seconds = 60
max_reindex_batch_size = 1000

# --- Phase 6 additions (append only) ---
# Per CHUNK-8.0a ANNEX + prose: all surface (api/cli/mcp/chat/autonomy/lexical) params
# toggleable per §1.8. Defaults match the spec. Surfaces compose Phase 5 actor layer
# via Protocols + AutonomyGate (no bypass per §1.7 / Appendix D).

[api]
host = "127.0.0.1"
port = 8000
cors_origins = ["http://localhost:3000"]
workers = 1
chat_max_history_turns = 50
review_page_size = 20
artifact_page_size = 20

[cli]
color = true
pager = true
output_format = "table"              # table / json / yaml

[mcp]
enabled = true
transport = "stdio"                   # stdio / sse
max_concurrent_tools = 5

[chat]
system_prompt_path = "prompts/chat_system.md"
max_context_turns = 50
auto_summarize_at = 40               # trigger summarization at this turn count

[autonomy]
default_level = "read"               # default autonomy for new sessions
escalation_requires_definer = true    # admin actions require DEFINER approval
audit_retention_days = 90
model_gen_assumption = "Models should not autonomously escalate to admin actions"

[lexical]
db_path = "db/lexical.db"
fts5_tokenizer = "unicode61"

# --- Phase 8 additions (append only) ---
# Per CHUNK-10.0a ANNEX + prose: knowledge compilation, plugin system,
# collaborator access, performance tuning, release metadata.
# All toggleable per §1.8. Defaults per spec. KnowledgeStore distinct from Canonical.

[knowledge]
compilation_model_slot = "synthesis"
evaluation_model_slot = "evaluation"
max_source_canonicals = 10
compilation_confidence_threshold = 0.60
auto_index_on_approval = true
model_gen_assumption = "Synthesis model can reliably produce structured knowledge summaries from multiple canonical sources"

[plugins]
plugins_dir = "plugins"
enabled = true
auto_discover = true
sandbox_mode = true
model_gen_assumption = "Plugins provide extensibility for model providers beyond built-in slots"

[collaborators]
enabled = false
max_collaborators = 5
collaborator_can_create_drafts = true
collaborator_can_submit_review = true
collaborator_can_approve = false
readonly_can_search = true

[performance]
profiling_enabled = false
max_memory_mb = 4096
retrieval_timeout_seconds = 30.0
batch_embed_size = 32
sqlite_wal_mode = true
sqlite_busy_timeout_ms = 5000
vector_query_limit = 50
fts5_query_limit = 50

[release]
release_version = "0.1.0"
release_date = ""  # set by 10.7
release_status = "alpha"
architecture_revision = "5.2"

