# AIP Alpha Gold Evaluation Set
# Sprint 10 — 40 known-answer questions from AIP's own docs and architecture.
#
# Each question has:
#   query: The natural-language question
#   relevant_ids: Document/chunk IDs that should be retrieved (partial match OK)
#   expected_entities: Named entities that should appear in results
#   domain: Knowledge domain hint
#   tags: Categorisation tags
#   diagnosis_hint: Which pipeline stage to blame if this fails
#     ingestion = source material not in corpus
#     embedding = source in corpus but not embedded
#     retrieval = source embedded but not retrieved
#     ranking = source retrieved but ranked too low
#     synthesis = source retrieved and ranked but not used in answer
#     missing = source material does not exist in AIP

