# docker-compose.yml — Phase 7 9.6 Production Packaging
# Profiles:
#   laptop: sqlite_vss + Ollama + local models (laptop-viable)
#   production: pgvector + API models + auth

version: '3.8'

services:
  aip:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${AIP_PORT:-8000}:8000"
    environment:
      - AIP_PROFILE=${AIP_PROFILE:-laptop}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db/state.db}
    volumes:
      - ./data:/app/db
      - ./config:/app/config
    depends_on:
      - ollama
    profiles:
      - laptop
      - production

  # Laptop profile only
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - laptop

  # Production profile only (external pgvector assumed or add postgres+pgvector service)
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   environment:
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data
  #   profiles:
  #     - production

volumes:
  ollama-data:
  pg-data:
