# docker-compose.yml — Phase 7 9.6 Production Packaging
# Profiles:
#   laptop: sqlite_vss + Ollama + local models (laptop-viable)
#   production: pgvector + API models + auth
#
# Usage:
#   Laptop:    docker compose --profile laptop up --build
#   Production: docker compose --profile production up --build
#
# Or use the profile-specific files:
#   docker compose -f deploy/docker-compose.laptop.yml up --build
#   docker compose -f deploy/docker-compose.production.yml up --build

version: '3.8'

services:
  aip:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: aip
    ports:
      - "${AIP_PORT:-8000}:8000"
    environment:
      - AIP_PROFILE=${AIP_PROFILE:-laptop}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db/state.db}
    volumes:
      - aip-data:/app/db
      - ../config:/app/config:ro
    depends_on:
      ollama:
        condition: service_started
        required: false
      postgres:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - laptop
      - production

  # Laptop profile only — local model inference
  ollama:
    image: ollama/ollama:latest
    container_name: aip-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - laptop

  # Production profile only — PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aip-postgres
    environment:
      POSTGRES_USER: aip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: aip
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip -d aip"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - production

volumes:
  aip-data:
    driver: local
  ollama-data:
    driver: local
  pg-data:
    driver: local
