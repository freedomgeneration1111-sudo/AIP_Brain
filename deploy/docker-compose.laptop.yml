# docker-compose.laptop.yml — Laptop profile per Phase 7 CHUNK-9.6
# SQLite + sqlite-vss + Ollama (local models, no PostgreSQL)
#
# Usage:
#   docker compose -f deploy/docker-compose.laptop.yml up --build
#   docker compose -f deploy/docker-compose.laptop.yml up -d

version: '3.8'

services:
  aip-laptop:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: aip-laptop
    ports:
      - "${AIP_PORT:-8000}:8000"
    environment:
      - AIP_PROFILE=laptop
      - AIP_CONFIG=/app/config/aip.config.toml
    volumes:
      - aip-laptop-data:/app/db
      - ../config:/app/config:ro
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4096M
    profiles:
      - laptop

  ollama:
    image: ollama/ollama:latest
    container_name: aip-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - laptop

volumes:
  aip-laptop-data:
    driver: local
  ollama-data:
    driver: local
