  - article_id: "wiki-embedding-pipeline"
    title: "Embedding Pipeline"
    domain: "aip"
    description: "The embedding generation pipeline: providers, batch processing, and the path from unembedded turns to vector-indexed retrieval."
    content: |
      The embedding pipeline transforms corpus turn text into vector representations that enable semantic similarity search. This pipeline is critical for hybrid retrieval quality, as vector search captures meaning-based relevance that lexical search alone cannot provide.

      The pipeline supports multiple embedding providers. Ollama provides local embedding generation via the /api/embeddings endpoint, suitable for the laptop deployment profile. OpenAI-compatible providers offer cloud-based embedding via the /v1/embeddings endpoint. A factory pattern at adapter/embedding/factory.py selects the provider based on configuration, with a fake provider for CI determinism. The embedding provider is resolved through the ModelSlotResolver's embedding slot.

      The embedding process is designed for batch operation. Sexton's embedding pass processes up to 50 turns per cycle, every 300 seconds. At this rate, a full embedding of the 2,716 unembedded turns would take approximately 17 hours of continuous operation. Currently, only 50 turns are embedded — approximately 1.8% of the corpus — representing the single largest gap in retrieval quality.

      The aip embed CLI command provides manual control over the embedding process, supporting --limit to cap the number of turns embedded per run. The aip corpus tag command must run before embedding to ensure that turns have domain assignments, as embedding without domain context reduces the effectiveness of domain-filtered retrieval.

      Once generated, embeddings are stored in vectors.db via the VectorStore implementation. The sqlite-vss backend uses SQLite's vector search extension for laptop deployment, while pgvector provides production-grade vector search with PostgreSQL. The VectorStore Protocol in the foundation layer ensures that the orchestration layer remains backend-agnostic.

      Coverage-aware gating in the retrieval orchestrator monitors embedding coverage. When coverage falls below 10%, the vector channel is disabled and FTS5-only results are returned, preventing degraded hybrid quality from sparse embeddings.
    tags: ["embedding", "vectors", "pipeline", "providers", "batch"]
    entities: ["ModelSlotResolver", "Sexton", "VectorStore", "AIP"]
    related_topics: ["wiki-hybrid-retrieval", "wiki-sexton-actor", "wiki-storage-model", "wiki-corpus-turn-model"]
