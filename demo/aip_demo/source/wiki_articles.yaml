  - article_id: "wiki-knowledge-graph"
    title: "Knowledge Graph"
    domain: "aip"
    description: "AIP's knowledge graph: entity extraction, bridge-tagged edges, PPR retrieval, and Cytoscape.js visualization."
    content: |
      The AIP knowledge graph captures entity relationships and domain connections extracted from the corpus. It serves as the structural backbone for graph-aware retrieval, providing a navigable map of how knowledge domains and entities relate to each other.

      The graph is stored in state.db with two tables: graph_nodes and graph_edges. Nodes represent entities and domains, while edges represent relationships between them. The current graph contains 36 nodes and 17 edges, built from bridge-tagged corpus turns via the aip corpus graph --build-from-bridges command. The entity alias registry (22 entries from entity_aliases.md) provides canonical name resolution, ensuring that variants like "aip_methodology" and "aip" map to the same node.

      Bridge tags are the primary mechanism for edge creation. When Beast tags a corpus turn with a bridge like "nbcm->theology_research", the graph extraction process creates or strengthens an edge between those two domain nodes. The approved connector vocabulary defines 17 valid bridge patterns, each with a documented semantic relationship.

      The GraphRetriever implements Personalized PageRank (PPR) via networkx for graph-based query expansion. Given a set of seed entities, PPR computes influence scores across the graph, surfacing relevant nodes that may not be directly connected to the query terms. Full PPR expansion is implemented but not yet wired into the chat path, as entity extraction from free-text would add latency.

      The Cytoscape.js visualization at /graph-viz provides a standalone dark-mode page for exploring the graph interactively. Domain neighbor injection in augmented chat uses 1-hop adjacency lookup — when Beast identifies the active domain, it retrieves connected domains and includes their summaries in the synthesis context. The GraphStore has been converted to aiosqlite with a Protocol in the foundation layer, ensuring it follows the same patterns as other adapter stores.
    tags: ["graph", "knowledge-graph", "ppr", "entities", "visualization"]
    entities: ["AIP", "GraphRetriever", "GraphStore", "Beast"]
    related_topics: ["wiki-hybrid-retrieval", "wiki-domain-registry", "wiki-beast-counsel-layer", "wiki-embedding-pipeline"]
