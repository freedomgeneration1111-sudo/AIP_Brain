articles:
  - article_id: "wiki-aip-overview"
    title: "AIP_Brain Overview"
    domain: "aip"
    description: "Comprehensive overview of AIP_Brain, its purpose, and core principles."
    content: |
      AIP_Brain is a local-first sovereign knowledge engine that manages the lifecycle of knowledge artifacts from specification through synthesis, evaluation, and canonical promotion. Built as AI Poiesis (AIP) v0.1, it operates under a single governing axiom: the human is the DEFINER, the AI is the instrument. Every artifact promotion requires an explicit DEFINER gate approval. No code path may transition an artifact to APPROVED or any equivalent terminal state on its own initiative.

      The system enforces three core principles. First, DEFINER sovereignty: no UI, workflow, Beast cadence, MCP call, or queued task may bypass the DEFINER gates. Second, no silent degradation: the evaluation pipeline does not silently pass artifacts, and default scores are 0.0 on evaluation failure. Third, local-first sovereignty: the DEFINER's corpus and artifacts remain under the DEFINER's control. No component may exfiltrate data or force cloud egress as a precondition of function.

      AIP_Brain follows a strict three-layer architecture — foundation, orchestration, and adapter — with Protocol-based dependency injection that enables swapping storage backends, model providers, and embedding providers without changing business logic. All cross-layer dependencies are expressed via Python Protocol classes (PEP 544), not concrete imports.

      The current corpus contains 2,766 tagged turns across three sources, with 28 Beast domains and a knowledge graph of 36 nodes and 17 edges. The system is in alpha status, with ~1.8% embedding coverage and DEBT-006 as the critical outstanding gap. Despite these alpha limitations, the foundational ingest-ask-review-approve-export pipeline is fully operational, and the system runs its own dogfood loop — ingesting its own development conversations and querying them to ground future design work in prior decisions.
    tags: ["overview", "architecture", "sovereignty", "local-first", "definer"]
    entities: ["AIP", "DEFINER", "Beast", "Vigil", "Sexton"]
    related_topics: ["wiki-definer-sovereignty", "wiki-three-layer-architecture", "wiki-storage-model", "wiki-alpha-boundaries"]
    source_type: "curated"
    importance: 0.95

  - article_id: "wiki-definer-sovereignty"
    title: "DEFINER Sovereignty"
    domain: "aip"
    description: "The core axiom of AIP: the human is the DEFINER, the AI is the instrument, and every artifact requires explicit human approval."
    content: |
      DEFINER sovereignty is the foundational axiom of AIP. The human is the DEFINER — the author, the authority, the one who decides. The AI is the instrument: it proposes, drafts, retrieves, and executes, but it does not decide. This relationship is enforced in code, not merely asserted in documentation.

      The primary enforcement mechanism is the DEFINER gate. No artifact may reach APPROVED, COMMITTED, or any equivalent terminal state without an explicit DEFINER action. The AutonomyGate protocol enforces this at the orchestration layer, and the CanonicalStore refuses writes that lack verified DEFINER approval. The canonical promotion pipeline has ten explicit steps, and step six verifies that the approved_by field equals "definer" before any write proceeds.

      Autonomy is something the DEFINER grants explicitly and revocably. It is never something the system assumes. The AutonomyGate can escalate operations that affect admin-level resources, but escalation means routing to the DEFINER for a decision, not making the decision autonomously. An instrument that quietly decided things would not be a faster DEFINER; it would be an unaccountable author, and AIP refuses that by construction.

      This principle extends to model dispatch. The ModelSlotResolver never silently returns a placeholder when a real model is expected. Unconfigured slots return honest sentinel values like NEEDS_CONFIGURATION rather than fabricated content. CI fixture data is flagged with ci_fixture=True and blocked from production promotion.

      The DEFINER profile — a markdown document capturing preferences, expertise, and decision patterns — can be injected into augmented chat sessions, ensuring that synthesis is grounded in the DEFINER's own context. The profile is maintained by the DEFINER and never auto-modified by the system.
    tags: ["sovereignty", "governance", "definer", "autonomy", "approval"]
    entities: ["DEFINER", "AIP", "AutonomyGate", "CanonicalStore", "ModelSlotResolver"]
    related_topics: ["wiki-aip-overview", "wiki-no-silent-degradation", "wiki-ecs-state-machine", "wiki-artifact-lifecycle"]
    source_type: "curated"
    importance: 1.0

  - article_id: "wiki-full-dogfood-mode"
    title: "Full Dogfood Mode"
    domain: "aip"
    description: "AIP's dogfood philosophy and the three dogfood modes: minimal, diagnostic, and full."
    content: |
      AIP runs its own ingest-ask-review-approve-export pipeline on its own development conversations. This is the dogfood loop: the project eats its own cooking. Architecture decisions, design discussions, and meeting transcripts are ingested into the corpus and queried via augmented chat to ground future design work in prior decisions.

      The dogfood modes define how deeply the system exercises its own capabilities. In minimal mode, the system runs only the foundational pipeline: ingestion, FTS5 search, and basic ask without model synthesis. This proves that ingestion and retrieval are working correctly even without a configured model provider. In diagnostic mode, the system adds model synthesis, evaluation passes, and review queue population, but skips automatic background maintenance cycles. This is useful for debugging specific pipeline stages without the noise of scheduled actors. In full mode, all three background actors run their scheduled cycles: Beast heartbeats every 60 seconds, Sexton maintenance every 300 seconds, and Vigil evaluation hourly. Full mode is the target operational state for production use.

      The dogfood smoke test scripts execute the complete loop automatically on a clean datastore: initialization, project creation, ingestion, ask, review, approve, and export. This test verifies that a fresh checkout can go from zero to a working knowledge base without manual intervention.

      Currently, full dogfood mode is limited by DEBT-006: the new Sexton actor is built but not wired into app.py, so automatic corpus tagging, embedding, wiki generation, and graph extraction are not running. Only the old failure-classifier Sexton fires every 300 seconds. Manual commands like aip corpus tag and aip embed serve as workarounds until DEBT-006 is resolved.
    tags: ["dogfood", "testing", "operational-modes", "smoke-test", "maintenance"]
    entities: ["AIP", "Beast", "Sexton", "Vigil", "DEFINER"]
    related_topics: ["wiki-aip-overview", "wiki-sexton-actor", "wiki-beast-actor", "wiki-alpha-boundaries"]
