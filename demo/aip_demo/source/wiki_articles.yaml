  - article_id: "wiki-beast-counsel-layer"
    title: "Beast Counsel Layer"
    domain: "aip"
    description: "How Beast assembles context advisory for augmented chat, including domain detection, retrieval injection, and profile integration."
    content: |
      The Beast Counsel Layer refers to Beast's context advisory assembly process for augmented chat — the mechanism by which Beast prepares a rich, grounded context stack before synthesis occurs. This is Beast's primary active function: when the DEFINER sends a message in AUGMENTED mode, Beast constructs a counsel of relevant knowledge to inform the synthesis model's response.

      The context advisory assembly follows a structured pipeline. First, Beast detects the active domain from the DEFINER's query using the domain registry and keyword matching. Second, it retrieves relevant corpus turns through the retrieval orchestrator, which dispatches across FTS5, vector, corpus, graph, wiki, and procedural channels. Third, it injects the domain's wiki article content into the system prompt, providing the synthesis model with a high-level understanding of the domain. Fourth, if configured, it loads and injects the DEFINER profile — a markdown document capturing preferences, expertise, and decision patterns — ensuring that synthesis is personalized to the DEFINER's context.

      The graph channel contributes domain neighbor injection. When Beast identifies the active domain, it performs a 1-hop graph neighbor lookup to find connected domains and includes summaries of those domains in the context. This cross-domain awareness helps the synthesis model understand when a query touches on multiple knowledge areas. Full Personalized PageRank expansion via GraphRetriever is implemented but not wired into the chat path, as entity extraction from free-text would add latency to the response.

      The assembled context is packaged as a structured system prompt that separates domain overview, retrieved evidence, DEFINER profile, and graph neighbors into distinct sections. This structure helps the synthesis model distinguish between what it knows from the corpus and what it might infer, supporting the validation-first output principle.
    tags: ["beast", "context-advisory", "augmented-chat", "counsel", "retrieval"]
    entities: ["Beast", "DEFINER", "GraphRetriever", "CODEX"]
    related_topics: ["wiki-beast-actor", "wiki-retrieval-pipeline", "wiki-knowledge-graph", "wiki-domain-registry"]
