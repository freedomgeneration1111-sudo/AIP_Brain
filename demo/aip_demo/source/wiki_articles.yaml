  - article_id: "wiki-ecs-state-machine"
    title: "ECS State Machine"
    domain: "aip"
    description: "The Entity Control State machine governing artifact lifecycle transitions with structural impossibility of invalid jumps."
    content: |
      The Entity Control State (ECS) machine is the declarative state machine that governs every artifact's lifecycle in AIP. Implemented in foundation/ecs_graph.py, the ECS machine makes it structurally impossible to skip states — you cannot, for example, transition directly from SPECIFIED to APPROVED.

      The valid states are SPECIFIED, GENERATED, REVIEWED, APPROVED, SUPERSEDED, REJECTED, and FAILED. The forward progression follows SPECIFIED to GENERATED to REVIEWED to APPROVED to SUPERSEDED. Two rejection branches exist: from GENERATED, an artifact can transition to FAILED (when generation itself fails) or REJECTED (when the DEFINER rejects the generated content). From REVIEWED, an artifact can transition to REJECTED.

      Every transition is validated by the ECS graph before execution. Invalid transitions raise InvalidTransitionError, preventing any code path from bypassing the lifecycle. The graph is declared as a static data structure — a dictionary mapping each state to its valid successors — which means the transition rules are auditable at a glance and cannot be accidentally modified at runtime.

      Every transition is recorded via EcsStore.transition() with the actor (who initiated the transition) and the reason (why the transition occurred). The PersistentEcsStore implementation writes these transitions to SQLite, providing a durable audit trail. The combination of structural validation and durable recording ensures that the artifact lifecycle is both enforced and auditable.

      The ECS machine embodies governance invariants AIP-G-01 (DEFINER Authority) and AIP-G-04 (Governed Lifecycle). Terminal states like APPROVED cannot be reverted without an explicit DEFINER override recorded as a DecisionRecord. The ECS graph's structural guarantees prevent the most common lifecycle violations — skipping review, auto-approving, or silently reverting terminal states — by making them impossible at the type level.
    tags: ["ecs", "state-machine", "lifecycle", "validation", "governance"]
    entities: ["ECS", "DEFINER", "PersistentEcsStore", "AIP"]
