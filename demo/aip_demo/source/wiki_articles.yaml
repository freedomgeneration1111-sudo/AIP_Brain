  - article_id: "wiki-hardening-cycle"
    title: "Hardening Cycle"
    domain: "aip"
    description: "AIP's hardening process: continuity audits, baseline freezes, and incremental quality improvement."
    content: |
      The hardening cycle is AIP's structured process for incremental quality improvement after the feature development phase. With the project in maintenance mode, no further feature sprints are planned. Instead, the hardening cycle addresses accumulated technical debt, closes runtime gaps, and improves system reliability through targeted chunks of work.

      Each hardening chunk begins with a continuity audit and baseline freeze, documented in CURRENT_STATE_BASELINE.md. This document captures the verified state of the codebase — repository metadata, codebase size and shape, architecture, source file distribution, data flow, actor status, corpus status, scaffolding status, configuration system, test infrastructure, known bugs, grep scan results, layer violation inventory, and production safety configuration. Every subsequent chunk must reference this baseline when claiming a change or fix.

      Completed hardening chunks have addressed critical runtime gaps. Chunk 3 closed credential sovereignty issues by ensuring API keys are never written to os.environ at runtime. Chunk 4 converted async-unsafe storage operations to aiosqlite, resolving DEBT-004 and DEBT-005 (GraphStore connection churn and missing Protocol). The P9 runtime gap closure addressed all known runtime gaps where core paths returned fake success.

      The hardening cycle also enforces production safety configuration. Seven hard-failure configurations are checked at startup: production with auth disabled, production with missing database password, production with weak password, production with fixture providers, and public bind without auth or with weak secrets. These checks are programmatic — unsafe configs fail with clear error codes, not warnings.

      The grep scan baseline captures counts of TODO, FIXME, except Exception: pass, and other code quality indicators. Tracking these counts across chunks ensures that hardening makes measurable progress rather than introducing new issues while fixing old ones.
    tags: ["hardening", "maintenance", "quality", "debt", "baseline"]
    entities: ["AIP", "DEFINER", "GraphStore", "ECS"]
