  - article_id: "wiki-three-layer-architecture"
    title: "Three-Layer Architecture"
    domain: "aip"
    description: "AIP's strict three-layer architecture: foundation, orchestration, and adapter, with Protocol-based dependency injection."
    content: |
      AIP_Brain follows a strict three-layer architecture with dependency inversion via Protocol classes. The three layers are foundation, orchestration, and adapter, each with declared import boundaries that are mechanically checked.

      The foundation layer contains pure validation, schemas, protocols, and the ECS state machine. It imports only from stdlib and pydantic — never from orchestration or adapter. This layer defines the data structures and contracts that the rest of the system depends on, including 30+ dataclass schemas across 13 modules, 16+ Protocol interfaces across 7 domain modules, the declarative ECS graph, and structural validation rules.

      The orchestration layer contains business logic, evaluation nodes, actors, and pipelines. It may import from foundation but must not import from adapter. This layer includes the canonical pipeline, the ask pipeline, the review/export pipeline, all six evaluation nodes (synthesis, faithfulness, domain coherence, adversarial eval, definer gate, commit), the three background actors, workflow engine, ingestion pipelines, retrieval orchestrator, and L4 trajectory monitoring.

      The adapter layer contains external interfaces and storage implementations. It may import from both foundation and orchestration, but only at the composition root (app.py, dependencies.py). This layer includes the FastAPI application with 17 routers, the Click-based CLI, MCP server, NiceGUI shell, and all storage implementations: SQLite stores for artifacts, canonicals, entities, projects, sessions, vigil quality, budget, corpus turns, and graph data.

      All cross-layer dependencies are expressed via Python Protocol classes for structural subtyping. This enables swapping SQLite for PostgreSQL without changing orchestration logic, swapping Ollama for OpenAI without changing pipeline code, and testing orchestration with in-memory stubs. Known violations exist where orchestration imports concrete adapter implementations through function-local imports, documented as the AIP-G-06/07 open finding.
    tags: ["architecture", "layers", "dependency-injection", "protocols", "foundation"]
    entities: ["AIP", "DEFINER", "ECS", "ModelSlotResolver"]
    related_topics: ["wiki-layer-discipline", "wiki-aip-overview", "wiki-ecs-state-machine", "wiki-storage-model"]
    source_type: "curated"
    importance: 0.95

  - article_id: "wiki-retrieval-pipeline"
    title: "Retrieval Pipeline"
    domain: "aip"
    description: "The hybrid retrieval pipeline with multi-channel dispatch and Reciprocal Rank Fusion."
    content: |
      The AIP retrieval pipeline uses multi-channel dispatch with Reciprocal Rank Fusion (RRF) to combine results from multiple search strategies into a single ranked list. When the DEFINER submits a query, the RetrievalOrchestrator dispatches the query in parallel to multiple channels: the FTS5 lexical channel for full-text search, the vector channel for semantic similarity search, the corpus channel for direct corpus turn matching, the graph channel for knowledge graph neighbor expansion, the wiki channel for domain article retrieval, and the procedural channel for structured knowledge.

      Each channel returns ranked results independently. RRF computes a score for each result using the formula 1/(k + rank), where k defaults to 60, weighted by configurable channel weights. The default weights are vector=0.6, fts=0.4, corpus=0.4. These weights are tunable via the retrieval.channel_weights section in aip.config.toml, and the scripts/retrieval_weight_tuning.py script performs grid search over weight combinations against golden queries.

      A coverage-aware gating mechanism disables the vector channel when embedding coverage falls below 10%, falling back to FTS5-only results. This prevents degraded hybrid quality when the vector index is sparse. Currently, with only ~1.8% embedding coverage, the vector channel provides limited benefit, and FTS5 carries most retrieval effectiveness.

      The evaluation harness supports three modes: hybrid (both channels), fts-only (lexical only), and all (every channel). Golden queries with corpus-mapped IDs provide ground truth for precision-at-5, recall-at-10, and MRR metrics. Vigil performs periodic precision-at-5 sampling with alerting on degradation, closing the quality feedback loop.
    tags: ["retrieval", "rrf", "hybrid-search", "channels", "evaluation"]
    entities: ["AIP", "RetrievalOrchestrator", "Vigil", "DEFINER"]
    related_topics: ["wiki-hybrid-retrieval", "wiki-embedding-pipeline", "wiki-vigil-actor", "wiki-knowledge-graph"]
    source_type: "curated"
    importance: 0.9

  - article_id: "wiki-beast-actor"
    title: "Beast Actor"
    domain: "aip"
    description: "The Beast actor: active synthesis support with context advisory, domain detection, and on-demand wiki drafting."
    content: |
      Beast is the active synthesis support actor in AIP. Per ADR-011, Beast operates in the foreground of the DEFINER's work sessions, not as a background scheduler. It is the active intelligence layer that fires when the DEFINER engages with the system.

      Beast's primary responsibility is context advisory assembly for augmented chat. When the DEFINER sends a message in AUGMENTED mode, Beast retrieves relevant corpus turns, builds the system prompt stack with domain overview and retrieved context, and injects the DEFINER profile if configured. This ensures that synthesis responses are grounded in the DEFINER's own corpus rather than generic model knowledge.

      Beast also performs real-time domain detection on incoming queries, proposes domain bridge connections when noticed during active sessions, and drafts wiki articles when explicitly triggered by the DEFINER or by threshold conditions. It does not, however, run scheduled background tagging passes, wiki generation cycles, graph building, embedding passes, or failure classification — all of those are Sexton responsibilities.

      Beast uses a frontier or near-frontier model slot because it needs reasoning capability to assemble context under time pressure and make relevance judgments. Currently this slot resolves to models like meta-llama/llama-4-maverick or equivalent. Beast runs a brief heartbeat cycle every 60 seconds to check for urgent conditions, but does no heavy work in that heartbeat.

      After the ADR-011 refactor, Beast's scheduled corpus tagging and wiki generation were removed from its run cycle. Beast is now idle between sessions except for the heartbeat. The log message "beast: no LLM configured, heartbeat only" is expected behavior between sessions, not an error condition. Beast becomes active only when the DEFINER sends a query.
    tags: ["actor", "beast", "context-advisory", "augmented-chat", "adr-011"]
    entities: ["Beast", "DEFINER", "AIP"]
    related_topics: ["wiki-sexton-actor", "wiki-vigil-actor", "wiki-domain-registry", "wiki-beast-counsel-layer"]
    source_type: "curated"
    importance: 0.9

  - article_id: "wiki-vigil-actor"
    title: "Vigil Actor"
    domain: "aip"
    description: "The Vigil actor: quality evaluation with synthesis monitoring, retrieval quality gates, and model-slot re-evaluation."
    content: |
      Vigil is the quality evaluation actor in AIP. Per ADR-011, Vigil is a separate actor responsible for evaluating synthesis outputs and monitoring for quality degradation. It is not merely a cycle name — it is a distinct actor with specific quality assurance responsibilities.

      Vigil monitors two quality dimensions. For synthesis quality, it evaluates augmented chat responses for citation rate, grounding rate, and LLM faithfulness scoring. It flags responses that make claims not supported by retrieved sources and generates quality evaluation reports as reviewable artifacts. For retrieval quality, introduced in Sprint 6.4, Vigil performs periodic precision-at-5 sampling with degradation alerting. When retrieval quality drops below configured thresholds, Vigil raises alerts that appear in the operator console.

      Vigil also triggers re-evaluation on model slot changes. When the ModelSlotResolver's configuration changes — for example, when the DEFINER switches the synthesis model — Vigil marks existing canonical artifacts for re-evaluation against the new model's output characteristics. This prevents stale quality assessments from persisting after model changes.

      Vigil records health checks to the VigilQualityStore, which provides persistent storage with retention and rollup policies. The store is implemented as a SQLite database in the adapter layer, following the same aiosqlite pattern as other adapter stores.

      Vigil runs hourly, evaluating the last N synthesis responses produced since its previous cycle. It does not evaluate in real-time, as that would add latency to every augmented response. Vigil uses an evaluation-capable model slot that can read a response and its sources and judge whether the response faithfully represents the sources. Vigil may also propose DEFINER profile amendments when it notices systematic synthesis patterns drifting from the DEFINER's intent.
    tags: ["actor", "vigil", "quality", "evaluation", "monitoring"]
    entities: ["Vigil", "DEFINER", "ModelSlotResolver", "VigilQualityStore"]
    related_topics: ["wiki-beast-actor", "wiki-sexton-actor", "wiki-model-slots", "wiki-no-silent-degradation"]
    source_type: "curated"
    importance: 0.9

  - article_id: "wiki-sexton-actor"
    title: "Sexton Actor"
    domain: "aip"
    description: "The Sexton actor: background maintenance with tagging, embedding, wiki generation, graph extraction, and failure classification."
    content: |
      Sexton is the background maintenance actor in AIP. Named for the church sexton who maintains the building — keeping it clean, current, and ready for when the operator arrives — the Sexton doesn't preach, it prepares. Per ADR-011, Sexton is the most active background actor in the system.

      The new Sexton implementation at actors/sexton.py (1,341 lines) supports five operations. Tagging runs Beast domain tagging on untagged corpus turns in batches of up to 200 per cycle. Embedding runs background embedding passes on unembedded turns at approximately 50 turns per cycle. Wiki generation produces domain article drafts as GENERATED artifacts for domains that exceed the freshness threshold. Graph extraction infers new entity relationships and updates graph edges from bridge-tagged turns. Failure classification assigns domain coordinates using the Appendix E taxonomy with severity levels A through F, plus seven special conditions, and derives intervention recommendations.

      Sexton runs a scheduled vigil cycle every 300 seconds. Each cycle runs a subset of operations based on what needs doing: scan for untagged turns, check embedding status, check wiki freshness, check graph staleness, classify pending proposals, and write a cycle observation artifact. Sexton uses a mid-tier free model slot because its operations are structured classification, summarization, and extraction tasks that do not require frontier reasoning.

      Critically, the new Sexton is built but not yet wired into app.py — this is DEBT-006, the highest-priority technical debt item. The old failure-classifier-only Sexton at sexton/sexton.py (~220 lines) is currently active, running only run_classification_cycle() every 300 seconds. Until DEBT-006 is resolved, automatic corpus tagging, embedding, wiki generation, and graph extraction are not running. The 2,716 unembedded turns represent the single largest gap in retrieval quality.
    tags: ["actor", "sexton", "maintenance", "tagging", "embedding", "debt-006"]
    entities: ["Sexton", "AIP", "Beast", "DEFINER"]
    related_topics: ["wiki-beast-actor", "wiki-vigil-actor", "wiki-embedding-pipeline", "wiki-domain-registry", "wiki-alpha-boundaries"]
    source_type: "curated"
    importance: 0.95

  - article_id: "wiki-codex-wiki"
    title: "CODEX Wiki"
    domain: "aip"
    description: "The CODEX Wiki subsystem: librarian, domain articles, and the wiki generation and retrieval pipeline."
    content: |
      The CODEX Wiki subsystem manages the generation, storage, and retrieval of domain wiki articles within AIP. Wiki articles serve as synthesized summaries of corpus knowledge within specific domains, providing the DEFINER with high-level overviews that are grounded in the actual corpus turns.

      The CODEX Librarian, located at orchestration/codex/librarian.py, is responsible for managing the wiki lifecycle. It determines which domains need fresh wiki articles based on token thresholds — when a domain accumulates more than 200k new words since its last wiki generation, the Librarian flags it for compilation. The Librarian also handles wiki article versioning, ensuring that updated articles are generated as new GENERATED artifacts that go through the standard ECS review and approval process.

      Wiki articles are stored via the CodexStore in the adapter layer and indexed for retrieval through the wiki channel in the retrieval orchestrator. When a query is dispatched, the wiki channel retrieves relevant domain articles and includes them in the RRF fusion alongside results from other channels. This means that wiki articles serve a dual purpose: they provide the DEFINER with curated domain overviews, and they improve retrieval quality by adding a synthesized knowledge layer to the hybrid search.

      In augmented chat, Beast's context advisory assembly includes domain wiki content in the system prompt stack. When the DEFINER asks a question in AUGMENTED mode, the relevant domain's wiki article is injected alongside retrieved corpus turns, giving the synthesis model a high-level understanding of the domain before it generates a response.

      Currently, wiki generation is operational as infrastructure but not running automatically due to DEBT-006. The Sexton's wiki compilation operation is part of the unwired new actor. Manual wiki generation remains available through CLI commands.
    tags: ["codex", "wiki", "librarian", "domain-articles", "knowledge-synthesis"]
    entities: ["CODEX", "Sexton", "Beast", "CodexStore"]
    related_topics: ["wiki-retrieval-pipeline", "wiki-sexton-actor", "wiki-domain-registry", "wiki-artifact-lifecycle"]
