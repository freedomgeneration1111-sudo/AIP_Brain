  - article_id: "wiki-hybrid-retrieval"
    title: "Hybrid Retrieval (FTS5 + Vector + Graph)"
    domain: "aip"
    description: "The three-pillar hybrid retrieval system combining lexical search, semantic vectors, and graph traversal."
    content: |
      AIP's hybrid retrieval system combines three complementary search strategies into a unified ranked output through Reciprocal Rank Fusion. Each strategy addresses a different aspect of information need, and their combination produces results that are more robust than any single approach.

      The FTS5 lexical channel provides exact-term and phrase matching using SQLite's full-text search extension. It excels at finding specific technical terms, proper nouns, and exact phrases from the corpus. The lexical store is implemented in the adapter layer at adapter/lexical/sqlite_fts5_store.py and is always available regardless of vector or graph status. Currently, FTS5 carries most retrieval effectiveness because the vector index covers only ~1.8% of the corpus.

      The vector channel provides semantic similarity search using embedding representations. When a query is embedded, the vector store returns turns whose embeddings are closest in vector space to the query embedding. This captures meaning-based relevance that lexical search misses — for example, a query about "sovereignty" might match turns about "DEFINER authority" even without term overlap. The vector store supports sqlite-vss for laptop profile and pgvector for production.

      The graph channel provides knowledge-graph-aware retrieval through domain neighbor expansion and Personalized PageRank. When a query touches a domain, the graph channel retrieves connected domains and their associated turns. The GraphRetriever implements PPR via networkx, expanding query entities through the graph structure. Currently, 1-hop neighbor lookup is active in the chat path; full PPR expansion awaits faster entity extraction.

      Coverage-aware gating ensures that the hybrid system degrades gracefully. When vector coverage is below 10%, the vector channel is disabled and FTS5-only results are returned. This prevents the vector channel from degrading result quality with sparse, unrepresentative embeddings. The channel weights (vector=0.6, fts=0.4, corpus=0.4) are configurable and tunable through grid search.
    tags: ["retrieval", "hybrid", "fts5", "vector", "graph"]
    entities: ["AIP", "RetrievalOrchestrator", "GraphRetriever", "VectorStore"]
    related_topics: ["wiki-retrieval-pipeline", "wiki-embedding-pipeline", "wiki-knowledge-graph", "wiki-ecs-state-machine"]
