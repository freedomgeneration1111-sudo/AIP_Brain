  - article_id: "wiki-corpus-turn-model"
    title: "Corpus Turn Model"
    domain: "aip"
    description: "The CorpusTurn data model and how individual conversation turns are ingested, tagged, embedded, and indexed."
    content: |
      The CorpusTurn is the fundamental unit of knowledge in AIP's corpus. Each turn represents a single exchange in a conversation — a user message paired with an assistant response — and carries metadata for domain classification, embedding status, bridge connections, and provenance tracking.

      A CorpusTurn includes fields for the turn identifier, source account (identifying which export or ingestion batch it came from), source model (which AI model produced the response), user text, assistant text, and thinking text (preserved from models that expose chain-of-thought). Domain fields include primary_domain (the Beast-assigned domain tag), secondary_domains (additional domain assignments), bridges (domain-to-domain connector strings from the approved vocabulary), and importance_score (a 0.0-1.0 rating).

      The corpus turn lifecycle begins with ingestion. The ingestion pipeline supports multiple input formats — ChatGPT JSON exports, Claude conversation exports, markdown transcripts, and plain text — each handled by a dedicated parser. After parsing, turns are chunked if they exceed size limits, persisted to the CorpusTurnStore in state.db, and indexed in the FTS5 lexical database for full-text search.

      After ingestion, Beast domain tagging assigns primary and secondary domains to each turn using the 28-domain registry. Bridge tags connect turns that span multiple domains, using the approved connector vocabulary (for example, "nbcm->theology_research" for turns connecting physics to scripture). The current corpus contains 2,766 turns across three source accounts, all tagged but only 50 embedded (~1.8% coverage).

      Embedding is the process of generating vector representations for semantic search. Each turn's text is processed through the embedding pipeline and stored in vectors.db. The embedding gap — 2,716 unembedded turns — is the single largest factor limiting hybrid retrieval quality. Full embedding requires resolving DEBT-006 to wire the new Sexton actor's automatic embedding pass.
    tags: ["corpus", "ingestion", "turns", "tagging", "embedding"]
    entities: ["CorpusTurn", "Beast", "Sexton", "AIP"]
    related_topics: ["wiki-embedding-pipeline", "wiki-domain-registry", "wiki-sexton-actor", "wiki-retrieval-pipeline"]
