  - article_id: "wiki-domain-registry"
    title: "Domain Registry"
    domain: "aip"
    description: "The Beast Domain Registry: 28 domains, approved connector vocabulary, and the proposal protocol for new domains."
    content: |
      The Beast Domain Registry (v1.1) is the authoritative domain taxonomy for corpus tagging. Beast reads this registry before every tagging cycle and may propose additions but never unilaterally creates domains. All proposals go to DEFINER review before becoming active.

      The registry defines 28 active domains organized into categories. AI and Technology includes aip (the unified intellectual endeavor), aip_brain (the engine room), aip_loom (long-form writing), and codeforge (autonomous coding). Science and Research covers nbcm (null-boundary physics), water_science (EZ water research), gef_tech (waste-to-energy), physics_education, and ancient_archaeology. Commercial and Product includes oxaway, forge_bars, frost_protection, wenatchee_wind, and harvest_harmonics. Theology and Ministry spans theology_research, ministry, and scripture_linguistics. Education and Development covers freedom_gen, bonded_labor, and social_justice. Personal and Operational includes freelance, personal_logistics, personal_health, creative, agi_philosophy, and quarantine.

      Each domain entry specifies a DOMAIN_ID, DESCRIPTION, CORE_KEYWORDS, EXCLUDE rules, and IMPORTANCE_FLOOR. The EXCLUDE field prevents misclassification by explicitly stating what does not belong despite surface similarity. The IMPORTANCE_FLOOR sets the minimum importance score for any turn in that domain.

      The approved connector vocabulary defines 17 bridge patterns with documented semantic relationships. Bridges like "nbcm->theology_research" (physics framework connects to scripture cosmology) and "gef_tech->bonded_labor" (waste-to-energy funding liberation) capture cross-domain connections that inform both graph construction and retrieval augmentation.

      When Beast discovers three or more turns that don't fit approved domains, it files a domain proposal as a beast_domain_proposal artifact in GENERATED state. The proposal includes the proposed ID, description, evidence turn IDs, confidence, suggested connectors, and rationale. The DEFINER approves or rejects with notes. Rejected proposals include DEFINER guidance that Beast incorporates into future tagging decisions.
