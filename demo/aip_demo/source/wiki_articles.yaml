  - article_id: "wiki-alpha-boundaries"
    title: "Alpha Boundaries and Known Limitations"
    domain: "aip"
    description: "Current alpha status boundaries: embedding coverage, DEBT-006, MCP scaffolding, and other known limitations."
    content: |
      AIP v0.1 is alpha software in active development by a single DEFINER. The following boundaries define what is working, what is limited, and what is scaffold.

      The critical active limitation is DEBT-006: the new Sexton actor at actors/sexton.py (1,341 lines, five operations) is built but not wired into app.py. The old failure-classifier-only Sexton is currently active, running run_classification_cycle() every 300 seconds. As a result, automatic corpus tagging, embedding, wiki generation, and graph extraction are not running. Only failure classification fires automatically. This is the highest-priority debt item for maintenance mode.

      Embedding coverage stands at approximately 1.8% — only 50 of 2,766 turns are embedded. Hybrid retrieval improvement over FTS5-only will be measurable only after a full embedding pass completes, which requires the DEBT-006 fix. FTS5 search works well for lexical queries, but semantic search is severely limited. At Sexton's planned rate of 50 turns per cycle every 300 seconds, completing the embedding pass would take approximately 17 hours of continuous operation.

      MCP tool dispatch is built but not runtime-wired. The MCP server implements real search dispatch and artifact approval via Protocols, but it is not reachable via API or CLI today. The autonomy_gate=None escape hatch in server.py is a fail-open risk for write and admin tools that must be hardened to fail-closed before MCP is wired into the runtime.

      The adaptive router does not adapt. Budget enforcement and route existence are real, but update_weights() is a no-op and exploration/exploitation is random. ScriptNode execution returns DISABLED in production mode. No review queue web UI exists for MANUAL mode — CLI review commands serve as the interface. Per-component performance metrics are estimated rather than measured.

      Two test files have pre-existing failures when run in the full suite due to environment variable and global state pollution, though they pass in isolation. The overall test count stands at 1002+ passing with 23 skipped.
    tags: ["alpha", "limitations", "boundaries", "debt-006", "known-issues"]
    entities: ["AIP", "Sexton", "MCP", "DEFINER"]
    related_topics: ["wiki-sexton-actor", "wiki-no-silent-degradation", "wiki-embedding-pipeline", "wiki-hardening-cycle"]
