  - article_id: "wiki-layer-discipline"
    title: "Layer Discipline"
    domain: "aip"
    description: "AIP's strict layer discipline rules: import boundaries, Protocol-based communication, and known violations."
    content: |
      Layer discipline is the enforcement of strict import boundaries between AIP's three architectural layers. The declared rules are: foundation imports no AIP upper layers (stdlib and pydantic only), orchestration may import foundation but must not import adapter, and adapter may import both foundation and orchestration but only at the composition root. Adapter never imports orchestration directly outside the composition root.

      These rules are not merely guidelines — they are mechanically checked. The test_layering.py and test_layer_discipline.py test suites use AST import analysis to verify that no layer violates its declared boundaries. The governance conformance test (test_governance_conformance.py) also checks layer separation under invariants AIP-G-06 and AIP-G-07.

      All cross-layer dependencies are expressed via Protocol classes in the foundation layer. The VectorStore, LexicalStore, CanonicalStore, ArtifactStore, EcsStore, EventStore, BudgetStore, AutonomyGate, ModelProvider, EmbeddingProvider, VigilStore, AuthStore, KnowledgeStore, and GraphStore protocols define the interfaces that orchestration uses to communicate with adapter implementations. This structural typing enables dependency injection and testability without tight coupling.

      A known open finding exists under AIP-G-06/07: orchestration pipelines import concrete adapter implementations through 21 function-local imports across 7 files. These are not import-time coupling — they occur inside function bodies to defer the import — but they tension with the Protocol-based design. The resolution is a DEFINER decision: either relocate concrete wiring to a composition root so orchestration sees only Protocols, or record each offender in the suite's acknowledged_import_violations so the debt is visible. It will not be silently greened.

      Surface isolation is also enforced. The GUI communicates only through the FastAPI backend, never by importing aip.orchestration or accessing the container directly. This ensures that each surface can be developed, tested, and replaced independently.
    tags: ["layers", "discipline", "imports", "protocols", "governance"]
    entities: ["AIP", "DEFINER", "ECS", "ModelSlotResolver"]
