  - article_id: "wiki-no-silent-degradation"
    title: "No Silent Degradation"
    domain: "aip"
    description: "AIP's principle that the evaluation pipeline never silently passes artifacts and that failures are always distinguishable from success."
    content: |
      No silent degradation is a foundational principle of AIP, codified as governance invariant AIP-G-02: a component must not return success for work it did not perform. Unconfigured, unimplemented, or disabled paths must return an honest, distinguishable status rather than a hollow success. This principle pervades every subsystem in AIP.

      In the evaluation pipeline, default scores are 0.0 on evaluation failure. If the faithfulness evaluation node cannot reach the model, it does not fabricate a passing score — it returns 0.0 and flags the failure. CI fixture data is flagged with ci_fixture=True and is explicitly blocked from production promotion. The evaluation pipeline does not silently pass artifacts that have not been genuinely evaluated.

      In model dispatch, the ModelSlotResolver returns honest sentinel values when a slot is unconfigured. A slot with no model configured resolves to a placeholder like "<synthesis>" which the resolver refuses to send to any API, returning a structured error response instead. In CI mode, the resolver returns deterministic fixtures that are clearly labeled as "[CI-FIXTURE for synthesis]" — they are never mistaken for real model output.

      In storage operations, failed writes leave explicit recovery instructions rather than silently swallowing errors. The VersionedArtifactStore preserves prior versions before modification, and the ECS store validates state transitions before committing them, rolling back on failure.

      Scaffold surfaces — components that exist as structure with placeholder dispatch — are disclosed in STATUS.md, not hidden. MCP tool dispatch is built but documented as not runtime-wired. The adaptive router's update_weights() is documented as a no-op. ScriptNode production execution returns DISABLED rather than pretending to run. Every gap is named, every scaffold is disclosed, and no gap pretends to be complete.
    tags: ["governance", "honesty", "evaluation", "no-fake-success", "aip-g-02"]
    entities: ["AIP", "DEFINER", "ModelSlotResolver", "ECS"]
