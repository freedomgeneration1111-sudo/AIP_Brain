  - article_id: "wiki-artifact-lifecycle"
    title: "Artifact Lifecycle"
    domain: "aip"
    description: "How knowledge artifacts move through specification, generation, evaluation, review, approval, and supersession."
    content: |
      Every knowledge artifact in AIP follows a governed lifecycle managed by the ECS state machine. The lifecycle ensures that no artifact reaches a terminal state without explicit DEFINER action and that every state transition is recorded and auditable.

      Artifacts begin in the SPECIFIED state, representing a defined intent or requirement. They transition to GENERATED when a model produces content for the artifact — whether through synthesis, wiki generation, or another production pathway. From GENERATED, an artifact moves to REVIEWED when it has been examined but not yet approved. The REVIEWED state is a prerequisite for the APPROVED state, which represents the DEFINER's explicit blessing.

      The APPROVED state is terminal: it can only be left through SUPERSEDED, when a newer version of the artifact replaces it, or through an explicit DEFINER override recorded as a DecisionRecord. Two rejection paths exist: from GENERATED, an artifact can be REJECTED (preserving it for potential re-generation), and from any state, a FAILED transition records that a production attempt did not succeed.

      The canonical promotion pipeline enforces this lifecycle through ten explicit steps: verify REVIEWED state, read artifact content, run faithfulness evaluation, run domain coherence evaluation, check AutonomyGate for admin escalation, verify approved_by equals "definer", write to CanonicalStore, transition ECS state to APPROVED, re-index in vector and lexical stores if configured, and record Vigil health check with event.

      Version preservation is maintained through the VersionedArtifactStore, which ensures that superseded artifacts remain accessible for audit purposes. The artifact schema carries a provenance field that cites the exact sources from which the artifact derives. An artifact whose provenance is empty is refused, enforcing the source-grounding principle.
    tags: ["lifecycle", "ecs", "artifacts", "approval", "provenance"]
    entities: ["ECS", "DEFINER", "CanonicalStore", "AutonomyGate", "VersionedArtifactStore"]
    related_topics: ["wiki-ecs-state-machine", "wiki-definer-sovereignty", "wiki-no-silent-degradation", "wiki-codex-wiki"]
    source_type: "curated"
    importance: 0.9

  - article_id: "wiki-model-slots"
    title: "Model Slots"
    domain: "aip"
    description: "The ModelSlotResolver system for configuring and dispatching model calls across named slots."
    content: |
      AIP uses a named model slot system to manage model dispatch across different operational contexts. The ModelSlotResolver maps five known slots to concrete provider, model, and base_url configurations: synthesis (for generating answers), evaluation (for faithfulness and coherence assessment), sexton (for background maintenance tasks), beast (for context advisory and domain detection), and embedding (for vector generation).

      Configuration resolution follows a strict priority chain. Runtime overrides set via set_runtime_override have the highest priority — these are stored in-memory only and are never written to os.environ, ensuring credential sovereignty. Environment variables like AIP_SYNTHESIS_BASE_URL and AIP_SYNTHESIS_MODEL are read (not written) at startup time. Explicit slot configuration in aip.config.toml under the models section provides the baseline. Global defaults like AIP_OLLAMA_BASE_URL fill in remaining gaps.

      The resolver supports two provider types: Ollama for local model inference via the /api/chat endpoint, and OpenAI-compatible for any provider implementing the /v1/chat/completions API, including OpenAI, DeepSeek, Together, and Fireworks. In CI mode, the resolver returns deterministic fixtures with no network calls, ensuring reproducible test runs.

      Security is enforced through credential sovereignty: runtime overrides are never written to the process environment, preventing API key leakage to child processes, debugging tools, and log outputs. The resolver also guards against sentinel model names (placeholder values like "<synthesis>") being sent to real APIs, returning structured error responses instead.

      When the DEFINER changes model configuration — for example, switching the synthesis model via the admin API — the runtime override system updates the slot configuration immediately without requiring a restart. Vigil is notified of model slot changes and marks existing canonical artifacts for re-evaluation.
    tags: ["models", "slots", "configuration", "dispatch", "credential-sovereignty"]
    entities: ["ModelSlotResolver", "DEFINER", "Vigil", "AIP"]
    related_topics: ["wiki-vigil-actor", "wiki-no-silent-degradation", "wiki-operator-console", "wiki-definer-sovereignty"]
    source_type: "curated"
    importance: 0.85

  - article_id: "wiki-storage-model"
    title: "Storage Model"
    domain: "aip"
    description: "AIP's seven SQLite databases and their roles in the coordinated multi-store architecture."
    content: |
      AIP_Brain uses a coordinated multi-store architecture with seven SQLite databases, each serving a distinct concern. The primary databases are state.db (main database for artifacts, projects, events, ECS state, canonicals, graph, sessions, budget, entity, codex, and vigil data), lexical.db (FTS5 full-text search index), and vectors.db (vector similarity search index via sqlite-vss or pgvector). Supporting databases include vigil_quality.db (Vigil health data with retention and rollup), alert_history.db (alerting event history), trace.db (trace events and routing outcomes), and ace_playbook.db (ACE playbook state).

      All adapter-layer SQLite stores use aiosqlite for async-safe database access — no blocking sqlite3.connect() is permitted inside async methods. The SqliteConcurrencyManager provides a persistent connection pattern with initialize() and _get_conn() methods that prevent connection churn. CLI commands may use synchronous sqlite3.connect() since they run outside the async event loop, but the single remaining async-path offender in admin.py is documented as DEBT-007.

      The vector store factory supports three backends: sqlite-vss for laptop profile with local development, pgvector for production profile with PostgreSQL, and an in-memory store for testing. The factory pattern, combined with the VectorStore Protocol in the foundation layer, allows the orchestration layer to remain backend-agnostic.

      All CLI commands share the same database path initialized by aip init, defaulting to db/state.db. The coordinated multi-store design ensures that no manual --db-path argument is needed for normal operation. Deployment profiles define the storage strategy: laptop uses SQLite across all stores, while production requires PostgreSQL with mandatory authentication and strong secrets.
    tags: ["storage", "sqlite", "databases", "async", "multi-store"]
    entities: ["AIP", "SqliteConcurrencyManager", "VectorStore", "CanonicalStore"]
    related_topics: ["wiki-three-layer-architecture", "wiki-embedding-pipeline", "wiki-hybrid-retrieval", "wiki-layer-discipline"]
    source_type: "curated"
    importance: 0.9

  - article_id: "wiki-operator-console"
    title: "Operator Console"
    domain: "aip"
    description: "The operator-facing interfaces: CLI, web UI, and API for DEFINER interaction with AIP."
    content: |
      The operator console encompasses all DEFINER-facing surfaces for interacting with AIP. Three primary surfaces exist: the Click-based CLI, the FastAPI REST API with 17 routers, and the NiceGUI web shell. All surfaces communicate through the adapter layer and must not reach around the contract into orchestration internals.

      The CLI provides the primary operational interface. Commands cover the full lifecycle: aip init for system initialization, aip status for system health, aip ingest for corpus ingestion, aip ask for source-grounded queries, aip review for artifact review and approval, aip export for markdown export, aip corpus for corpus management, and aip eval for evaluation tools. All CLI commands share the same database path, eliminating configuration drift between commands.

      The FastAPI backend exposes 17 routers under /api/v1/, covering health, chat, ask, ingest, corpus, artifacts, review, knowledge, graph, graph visualization, models, sessions, projects, admin, ECS, actors, and wiki. The API includes a retrieval dashboard for monitoring search quality, a beast scan endpoint for on-demand corpus analysis, and vigil quality endpoints for monitoring evaluation metrics.

      The NiceGUI web shell provides a chat interface with CHAT and AUGMENTED modes, a projects management page, and an admin panel. The graph visualization at /graph-viz uses Cytoscape.js to render the knowledge graph with a dark-mode interface. Critically, the GUI communicates only through the FastAPI backend, never by importing orchestration modules or accessing the container directly — this is verified by surface isolation tests.

      A review queue web UI for MANUAL mode is not yet built. Currently, CLI review commands serve as the primary interface for artifact approval. The MCP server provides tool dispatch for search and artifact approval but is not runtime-wired, so it is not reachable via API or CLI today.
    tags: ["cli", "api", "operator", "surfaces", "ui"]
    entities: ["AIP", "DEFINER", "MCP", "Beast"]
    related_topics: ["wiki-layer-discipline", "wiki-artifact-lifecycle", "wiki-alpha-boundaries", "wiki-beast-actor"]
